[build]
  command = "npx expo export --platform web"
  publish = "dist"

[functions]
  node_bundler = "esbuild"
  # firebase-admin does dynamic requires that esbuild can't statically trace —
  # ship it from node_modules instead of bundling it.
  external_node_modules = ["firebase-admin"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
